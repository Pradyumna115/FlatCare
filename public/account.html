<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlatCare – Account Summary</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <div id="pageContent" style="display:none;">
        <div class="page-header" style="justify-content: space-between;">
            <div>
                <h2>Account Summary</h2>
                <p class="subtitle">Aditya Residency Welfare Association</p>
            </div>
            <div class="month-selector">
                <select id="monthSelect"></select>
                <select id="yearSelect"></select>
                <button class="btn btn-primary" onclick="loadAccount()">
                    Load
                </button>
            </div>
        </div>

        <div class="card"
            style="margin-bottom: 24px; padding: 30px; background: linear-gradient(135deg, var(--bg-alt) 0%, var(--bg) 100%);">
            <h2 style="margin-bottom: 8px; color: var(--primary); font-size: 24px;">Aditya Residency Welfare Association
            </h2>
            <p style="color: var(--text-muted); font-size: 16px; margin-bottom: 0; line-height: 1.5;">
                Commercial Tax Colony<br>
                Kothapet, Hyderabad
            </p>
        </div>

        <!-- High Level Summary -->
        <h3 style="margin-bottom: 16px;">Current Month Financial Summary</h3>
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-icon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="1" y="4" width="22" height="16" rx="2" ry="2" />
                        <line x1="1" y1="10" x2="23" y2="10" />
                    </svg></div>
                <div class="stat-label">Net Closing Balance</div>
                <div class="stat-value" id="netBalance">₹0</div>
            </div>
            <div class="stat-card green">
                <div class="stat-icon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" />
                        <polyline points="17 6 23 6 23 12" />
                    </svg></div>
                <div class="stat-label">Total Collections</div>
                <div class="stat-value" id="totalCollections">₹0</div>
            </div>
            <div class="stat-card orange">
                <div class="stat-icon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="1" x2="12" y2="23" />
                        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
                    </svg></div>
                <div class="stat-label">Total Expenses</div>
                <div class="stat-value" id="totalExpenses">₹0</div>
            </div>
        </div>

        <h3 style="margin-top: 32px; margin-bottom: 16px;">Community Status</h3>
        <div class="stats-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
            <div class="stat-card">
                <div class="stat-label">Total Flats</div>
                <div class="stat-value" id="totalFlats">0</div>
            </div>
            <div class="stat-card teal">
                <div class="stat-label">Occupied</div>
                <div class="stat-value" id="occupiedFlats">0</div>
            </div>
            <div class="stat-card" style="border-bottom: 4px solid var(--text-muted);">
                <div class="stat-label">Vacant</div>
                <div class="stat-value" id="vacantFlats">0</div>
            </div>
        </div>
    </div>

    <script src="./js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await getCurrentUser();
            if (!user) return; // redirect logic handled in app.js

            buildAppShell();
            populateMonthSelector('monthSelect', 'yearSelect');
            loadAccount();
        });

        async function loadAccount() {
            const month = getSelectedMonth('monthSelect');
            const year = getSelectedYear('yearSelect');

            const report = await apiGet(`/api/reports?month=${month}&year=${year}`);
            if (!report) return;

            // Financial Summary
            document.getElementById('netBalance').textContent = formatCurrency(report.closing_balance || 0);
            document.getElementById('totalCollections').textContent = formatCurrency(report.total_received || 0);
            document.getElementById('totalExpenses').textContent = formatCurrency(report.total_expenses || 0);

            // Community Status
            document.getElementById('totalFlats').innerText = report.flat_stats.total;
            document.getElementById('occupiedFlats').innerText = report.flat_stats.occupied;
            document.getElementById('vacantFlats').innerText = report.flat_stats.vacant;
        }
    </script>
</body>

</html>
