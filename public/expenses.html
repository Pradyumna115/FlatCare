<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlatCare – Expenses</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <div id="pageContent" style="display:none;">
        <div class="page-header">
            <div class="month-selector">
                <select id="monthSelect"></select>
                <select id="yearSelect"></select>
                <button class="btn btn-primary" onclick="loadExpenses()">Load</button>
            </div>
            <button class="btn btn-success" onclick="openAddExpense()">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19" />
                    <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
                Add Expense
            </button>
        </div>

        <!-- Stats -->
        <div class="stats-grid" style="grid-template-columns: repeat(2, 1fr);">
            <div class="stat-card red">
                <div class="stat-icon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="1" x2="12" y2="23" />
                        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
                    </svg></div>
                <div class="stat-label">Total Expenses</div>
                <div class="stat-value" id="totalExpenses">₹0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <polyline points="14 2 14 8 20 8" />
                    </svg></div>
                <div class="stat-label">Total Entries</div>
                <div class="stat-value" id="totalEntries">0</div>
            </div>
        </div>

        <!-- Category Breakdown Chart -->
        <div class="panel">
            <h2>
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="20" x2="18" y2="10" />
                    <line x1="12" y1="20" x2="12" y2="4" />
                    <line x1="6" y1="20" x2="6" y2="14" />
                </svg>
                Category Breakdown
            </h2>
            <div id="categoryChart"></div>
        </div>

        <!-- Expense Table -->
        <div class="panel" style="padding:0; overflow:hidden;">
            <div class="table-wrapper">
                <table id="expensesTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Date</th>
                            <th>Category</th>
                            <th>Description</th>
                            <th class="text-right">Amount</th>
                            <th>Mode</th>
                            <th>Ref</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="expensesBody">
                        <tr>
                            <td colspan="8">
                                <p class="no-data">Loading...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="./js/app.js"></script>
    <script>
        let expensesData = [];

        document.addEventListener('DOMContentLoaded', () => {
            buildAppShell('Expenses');
            populateMonthSelector('monthSelect', 'yearSelect');
            loadExpenses();
        });

        async function loadExpenses() {
            const month = getSelectedMonth('monthSelect');
            const year = getSelectedYear('yearSelect');
            const data = await apiGet(`/api/expenses?month=${month}&year=${year}`);
            if (!data) return;
            expensesData = data;

            const total = data.reduce((s, e) => s + e.amount, 0);
            animateCounter(document.getElementById('totalExpenses'), total);
            animateNumber(document.getElementById('totalEntries'), data.length);

            renderCategoryChart(data);
            renderExpenses(data);
        }

        function renderCategoryChart(expenses) {
            const container = document.getElementById('categoryChart');
            if (expenses.length === 0) {
                container.innerHTML = '<p class="no-data">No expenses to chart</p>';
                return;
            }

            const cats = {};
            expenses.forEach(e => { cats[e.category] = (cats[e.category] || 0) + e.amount; });
            const entries = Object.entries(cats).sort((a, b) => b[1] - a[1]);
            const max = Math.max(...entries.map(e => e[1]));

            const colors = ['#0ea5e9', '#22c55e', '#f59e0b', '#ef4444', '#6366f1', '#14b8a6', '#ec4899', '#8b5cf6'];

            let html = '<div class="bar-chart" style="margin-bottom:30px;">';
            entries.forEach(([cat, amt], i) => {
                const height = Math.max((amt / max) * 130, 20);
                const color = colors[i % colors.length];
                html += `<div class="bar" style="height:${height}px;background:${color};" title="${cat}: ${formatCurrency(amt)}">
          <span class="bar-value">${formatCurrency(amt)}</span>
          <span class="bar-label">${cat.length > 12 ? cat.substring(0, 12) + '...' : cat}</span>
        </div>`;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function renderExpenses(expenses) {
            const tbody = document.getElementById('expensesBody');
            if (expenses.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8"><p class="no-data">No expenses recorded this month</p></td></tr>';
                return;
            }

            const modeColors = {
                'Cash': 'badge-info',
                'UPI': 'badge-success',
                'Bank Transfer': 'badge-warning',
                'Other': 'badge-danger'
            };

            tbody.innerHTML = expenses.map((e, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${formatDate(e.date)}</td>
          <td><span class="badge badge-info">${e.category}</span></td>
          <td>${e.description || '-'}</td>
          <td class="text-right"><strong>${formatCurrency(e.amount)}</strong></td>
          <td><span class="badge ${modeColors[e.payment_mode] || 'badge-info'}">${e.payment_mode || 'Cash'}</span></td>
          <td>${e.reference_id ? `<code style="font-size:11px;">${e.reference_id}</code>` : '-'}
              ${e.attachment_path ? `<a href="${e.attachment_path}" target="_blank" title="View receipt" style="margin-left:4px;">📎</a>` : ''}
          </td>
          <td class="text-center">
            <button class="btn btn-ghost btn-sm" onclick="confirmDelete('${e.id}', '${e.category.replace(/'/g, "\\'")}')" title="Delete">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
          </td>
        </tr>
      `).join('');
        }

        function openAddExpense() {
            const categories = getAllExpenseCategories();
            const catOptions = categories.map(c => `<option value="${c}">${c}</option>`).join('');
            const today = new Date().toISOString().split('T')[0];

            const formHTML = `
        <div class="form-group">
          <label for="expDate">Date</label>
          <input type="date" id="expDate" value="${today}">
        </div>
        <div class="form-group">
          <label for="expCategory">Category</label>
          <select id="expCategory">${catOptions}</select>
        </div>
        <div class="form-group">
          <label for="expDescription">Description</label>
          <input type="text" id="expDescription" placeholder="Optional description">
        </div>
        <div class="form-group">
          <label for="expAmount">Amount (₹)</label>
          <input type="number" id="expAmount" placeholder="0" min="0" step="1">
        </div>
        <div class="form-group">
          <label for="expPaymentMode">Payment Mode</label>
          <select id="expPaymentMode">
            <option value="Cash">Cash</option>
            <option value="UPI">UPI</option>
            <option value="Bank Transfer">Bank Transfer</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label for="expReferenceId">Reference / Transaction ID</label>
          <input type="text" id="expReferenceId" placeholder="Optional reference number">
        </div>
        <div class="form-group">
          <label for="expAttachment">Receipt / Attachment</label>
          <div class="file-input-wrapper">
            <button type="button" class="file-input-btn" onclick="document.getElementById('expAttachment').click()">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
              <span id="expAttachmentName">Choose File</span>
            </button>
            <input type="file" id="expAttachment" accept=".jpg,.jpeg,.png,.pdf,.webp" onchange="document.getElementById('expAttachmentName').textContent = this.files[0] ? this.files[0].name : 'Choose File'">
          </div>
          <small style="color:var(--text-muted);margin-top:4px;display:block;">JPG, PNG, PDF, WEBP — Max 5MB</small>
        </div>
      `;

            showModal('Add Expense', formHTML, async () => {
                const month = getSelectedMonth('monthSelect');
                const year = getSelectedYear('yearSelect');

                const amount = parseFloat(document.getElementById('expAmount').value) || 0;
                if (amount <= 0) {
                    showToast('Please enter a valid amount', 'warning');
                    return;
                }

                const btn = document.getElementById('modalConfirmBtn');
                if (btn) btn.disabled = true;

                const formData = new FormData();
                formData.append('date', document.getElementById('expDate').value);
                formData.append('category', document.getElementById('expCategory').value);
                formData.append('description', document.getElementById('expDescription').value);
                formData.append('amount', amount);
                formData.append('month', month);
                formData.append('year', year);
                formData.append('payment_mode', document.getElementById('expPaymentMode').value);
                formData.append('reference_id', document.getElementById('expReferenceId').value);

                const fileInput = document.getElementById('expAttachment');
                if (fileInput.files.length > 0) {
                    formData.append('attachment', fileInput.files[0]);
                }

                try {
                    const response = await fetch('/api/expenses', {
                        method: 'POST',
                        body: formData,
                    });
                    const result = await response.json();
                    if (response.ok) {
                        showToast('Expense added successfully', 'success');
                        loadExpenses();
                    } else {
                        showToast(result.error || 'Failed to add expense', 'error');
                    }
                } catch (err) {
                    showToast('Failed to add expense', 'error');
                } finally {
                    if (btn) btn.disabled = false;
                }
            }, 'Add Expense', 'btn-success');
        }

        function confirmDelete(id, category) {
            showModal(
                'Delete Expense',
                `<p>Are you sure you want to delete this <strong>${category}</strong> expense?</p><p style="color:var(--text-muted);font-size:13px;margin-top:8px;">This action cannot be undone.</p>`,
                async () => {
                    const btn = document.getElementById('modalConfirmBtn');
                    if (btn) btn.disabled = true;
                    try {
                        const result = await apiDelete(`/api/expenses/${id}`);
                        if (result) {
                            showToast('Expense deleted', 'success');
                            loadExpenses();
                        }
                    } finally {
                        if (btn) btn.disabled = false;
                    }
                },
                'Delete',
                'btn-danger'
            );
        }
    </script>
</body>

</html>
