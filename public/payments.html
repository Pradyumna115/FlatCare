<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlatCare – Payments</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <div id="pageContent" style="display:none;">
        <div class="page-header">
            <div class="month-selector">
                <select id="monthSelect"></select>
                <select id="yearSelect"></select>
                <button class="btn btn-primary" onclick="loadPayments()">Load</button>
            </div>
            <div class="flex-center">
                <div class="search-box">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    <input type="text" id="searchInput" placeholder="Search flat...">
                </div>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid" id="paymentStats">
            <div class="stat-card green">
                <div class="stat-icon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="20 6 9 17 4 12" />
                    </svg></div>
                <div class="stat-label">Total Collected</div>
                <div class="stat-value" id="totalCollected">₹0</div>
            </div>
            <div class="stat-card red">
                <div class="stat-icon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="8" x2="12" y2="12" />
                        <line x1="12" y1="16" x2="12.01" y2="16" />
                    </svg></div>
                <div class="stat-label">Total Pending</div>
                <div class="stat-value" id="totalPending">₹0</div>
            </div>
            <div class="stat-card orange">
                <div class="stat-icon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path
                            d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
                        <line x1="12" y1="9" x2="12" y2="13" />
                        <line x1="12" y1="17" x2="12.01" y2="17" />
                    </svg></div>
                <div class="stat-label">Total Arrears</div>
                <div class="stat-value" id="totalArrears">₹0</div>
            </div>
        </div>

        <!-- Payments Table -->
        <div class="panel" style="padding:0; overflow:hidden;">
            <div class="table-wrapper">
                <table id="paymentsTable">
                    <thead>
                        <tr>
                            <th>Flat</th>
                            <th>Owner</th>
                            <th class="text-right">Maint + Garbage</th>
                            <th class="text-right">Past Arrears</th>
                            <th class="text-right">Extra Payment</th>
                            <th class="text-right">Total Due</th>
                            <th class="text-right">Amt Paid</th>
                            <th>Status</th>
                            <th>Date Paid</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="paymentsBody">
                        <tr>
                            <td colspan="8">
                                <p class="no-data">Loading...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="./js/app.js"></script>
    <script>
        let paymentsData = [];
        let arrearsMap = {};

        document.addEventListener('DOMContentLoaded', () => {
            buildAppShell('Payments');
            populateMonthSelector('monthSelect', 'yearSelect');
            loadPayments();
            setupTableSearch('searchInput', 'paymentsTable');
        });

        async function loadPayments() {
            const month = getSelectedMonth('monthSelect');
            const year = getSelectedYear('yearSelect');

            const [data, arrearsData] = await Promise.all([
                apiGet(`/api/payments?month=${month}&year=${year}`),
                apiGet(`/api/arrears?month=${month}&year=${year}`)
            ]);

            if (!data) return;

            paymentsData = data.payments || [];
            arrearsMap = {};

            if (arrearsData && arrearsData.arrears_by_flat) {
                for (const af of arrearsData.arrears_by_flat) {
                    arrearsMap[af.flat_id] = af.total_arrears;
                }
            }

            // Stats
            animateCounter(document.getElementById('totalCollected'), data.total_received || 0);
            animateCounter(document.getElementById('totalPending'), data.total_pending || 0);
            animateCounter(document.getElementById('totalArrears'), arrearsData ? arrearsData.total_arrears : 0);

            renderPayments();
        }

        function renderPayments() {
            const tbody = document.getElementById('paymentsBody');

            if (paymentsData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10"><p class="no-data">No payments found. Initialize this month from the Dashboard.</p></td></tr>';
                return;
            }

            tbody.innerHTML = paymentsData.map(p => {
                const isPaid = p.status === 'Paid';
                const badge = isPaid
                    ? '<span class="badge badge-success">Paid</span>'
                    : '<span class="badge badge-danger">Pending</span>';
                const rowClass = isPaid ? 'row-paid' : 'row-pending';
                const flatArrears = arrearsMap[p.flat_id] || 0;
                const arrearsStyle = flatArrears > 0 ? 'color:var(--danger);font-weight:700;' : '';

                const totalDue = (p.amount_expected || 0) + (p.garbage_charge || 0) + (p.previous_arrears || 0) + (p.extra_payment || 0);

                return `<tr class="${rowClass}">
          <td><strong>${p.flat_number}</strong></td>
          <td title="${p.contact}">${p.owner_name || '-'}</td>
          <td class="text-right">${formatCurrency((p.amount_expected || 0) + (p.garbage_charge || 0))}</td>
          <td class="text-right" style="color:var(--danger);">${formatCurrency(p.previous_arrears || 0)}</td>
          <td class="text-right">${formatCurrency(p.extra_payment || 0)}</td>
          <td class="text-right" style="font-weight: 700;">${formatCurrency(totalDue)}</td>
          <td class="text-right" style="font-weight: 600;">${formatCurrency(p.amount_paid || 0)}</td>
          <td>${badge}</td>
          <td>${p.date_paid ? formatDate(p.date_paid) : '-'}</td>
          <td class="text-center">
            ${isPaid ? `
              <button class="btn btn-ghost btn-sm" id="btn-pending-${p.id}" onclick="markPending('${p.id}')" title="Mark Pending or Edit">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
            ` : `
              <button class="btn btn-success btn-sm" id="btn-paid-${p.id}" onclick="markPaid('${p.id}')" title="Mark Paid">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                Paid
              </button>
              <button class="btn btn-ghost btn-sm" onclick="editPayment('${p.id}')" title="Edit Other Payments" style="margin-left:4px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
            `}
          </td>
        </tr>`;
            }).join('');
        }

        async function markPaid(paymentId) {
            const p = paymentsData.find(x => String(x.id) === String(paymentId));
            if (!p) return;

            const today = new Date().toISOString().split('T')[0];
            const totalDue = (p.amount_expected || 0) + (p.garbage_charge || 0) + (p.previous_arrears || 0) + (p.extra_payment || 0);
            const currentPaid = p.amount_paid || 0;

            const formHTML = `
                <div class="form-group">
                    <label for="payAmount">Amount Paid (₹)</label>
                    <input type="number" id="payAmount" value="${totalDue}" step="0.01">
                    <small style="color:var(--text-muted);">Current Due: ${formatCurrency(totalDue)}</small>
                </div>
                <div class="form-group">
                    <label for="payExtra">Extra Payment (₹) <small>(Optional: Advance, Donation, etc)</small></label>
                    <input type="number" id="payExtra" value="${p.extra_payment || 0}" step="0.01">
                </div>
                <div class="form-group">
                    <label for="payDate">Payment Date</label>
                    <input type="date" id="payDate" value="${p.date_paid || today}">
                </div>
                <div class="form-group">
                    <label for="payStatus">Payment Status</label>
                    <select id="payStatus">
                        <option value="Paid" ${p.status === 'Paid' ? 'selected' : ''}>Full Paid / Settled</option>
                        <option value="Pending" ${p.status === 'Pending' ? 'selected' : ''}>Partial / Pending</option>
                    </select>
                </div>
            `;

            showModal(`Record Payment - ${p.flat_number}`, formHTML, async () => {
                const amount = parseFloat(document.getElementById('payAmount').value) || 0;
                const extra = parseFloat(document.getElementById('payExtra').value) || 0;
                const date = document.getElementById('payDate').value;
                const status = document.getElementById('payStatus').value;

                const btn = document.getElementById('modalConfirmBtn');
                if (btn) btn.disabled = true;

                try {
                    const result = await apiPut(`/api/payments/${paymentId}`, {
                        amount_paid: amount,
                        extra_payment: extra,
                        status: status,
                        date_paid: date
                    });
                    if (result) {
                        showToast(`${p.flat_number} payment recorded`, 'success');
                        loadPayments();
                    }
                } finally {
                    if (btn) btn.disabled = false;
                }
            }, 'Save Payment', 'btn-success');
        }

        async function markPending(paymentId) {
            const p = paymentsData.find(x => String(x.id) === String(paymentId));
            showModal(
                'Revert Payment',
                `<p>Mark <strong>${p.flat_number}</strong> as pending?</p>`,
                async () => {
                    const btn = document.getElementById('modalConfirmBtn');
                    if (btn) btn.disabled = true;
                    try {
                        const result = await apiPut(`/api/payments/${paymentId}`, {
                            amount_paid: 0,
                            status: 'Pending',
                            date_paid: null
                        });
                        if (result) {
                            showToast(`${p.flat_number} reverted to Pending`, 'warning');
                            loadPayments();
                        }
                    } finally {
                        if (btn) btn.disabled = false;
                    }
                },
                'Revert',
                'btn-warning'
            );
        }

        async function editPayment(paymentId) {
            markPaid(paymentId); // Use the same unified modal
        }
    </script>
</body>

</html>
