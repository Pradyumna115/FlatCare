<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlatCare – User Management</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <div id="pageContent" style="display:none;">
        <div class="page-header">
            <h2 style="margin:0;font-size:16px;color:var(--text-secondary);">Manage admin, manager, and viewer accounts
            </h2>
            <button class="btn btn-success" onclick="openAddUser()">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19" />
                    <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
                Add User
            </button>
        </div>

        <!-- Users Table -->
        <div class="panel" style="padding:0; overflow:hidden;">
            <div class="table-wrapper">
                <table id="usersTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Username</th>
                            <th>Display Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Last Login</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersBody">
                        <tr>
                            <td colspan="8">
                                <p class="no-data">Loading...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Audit Log -->
        <div class="panel">
            <h2>
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                    <polyline points="14 2 14 8 20 8" />
                    <line x1="16" y1="13" x2="8" y2="13" />
                    <line x1="16" y1="17" x2="8" y2="17" />
                </svg>
                Recent Activity Log
            </h2>
            <div id="auditLog">
                <p class="no-data">Loading...</p>
            </div>
        </div>
    </div>

    <script src="./js/app.js"></script>
    <script>
        let usersData = [];

        document.addEventListener('DOMContentLoaded', async () => {
            buildAppShell('User Management');

            // Check if user is admin
            const me = await apiGet('/api/me');
            if (!me || me.role !== 'admin') {
                document.getElementById('pageContent').innerHTML =
                    '<div class="panel"><p class="no-data" style="color:var(--danger);">Access denied. Admin role required.</p></div>';
                return;
            }

            loadUsers();
            loadAuditLog();
        });

        async function loadUsers() {
            const data = await apiGet('/api/users');
            if (!data) return;
            usersData = data;
            renderUsers();
        }

        function renderUsers() {
            const tbody = document.getElementById('usersBody');
            tbody.innerHTML = usersData.map((u, i) => {
                const roleBadge = {
                    admin: '<span class="badge badge-danger">Admin</span>',
                    manager: '<span class="badge badge-warning">Manager</span>',
                    viewer: '<span class="badge badge-info">Viewer</span>'
                }[u.role] || `<span class="badge">${u.role}</span>`;

                const statusBadge = u.is_active
                    ? '<span class="badge badge-success">Active</span>'
                    : '<span class="badge badge-danger">Inactive</span>';

                const lastLogin = u.last_login
                    ? new Date(u.last_login + 'Z').toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })
                    : 'Never';

                return `<tr style="${!u.is_active ? 'opacity:0.5;' : ''}">
          <td>${i + 1}</td>
          <td><strong>${u.username}</strong></td>
          <td>${u.display_name || '-'}</td>
          <td>${u.email || '-'}</td>
          <td>${roleBadge}</td>
          <td>${statusBadge}</td>
          <td style="font-size:12px;color:var(--text-muted);">${lastLogin}</td>
          <td class="text-center">
            <button class="btn btn-ghost btn-sm" onclick="openEditUser(${u.id})" title="Edit">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="btn btn-ghost btn-sm" onclick="openChangePassword(${u.id}, '${u.username}')" title="Change Password">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </button>
            <button class="btn btn-ghost btn-sm" onclick="toggleActive(${u.id}, '${u.username}', ${u.is_active})" title="${u.is_active ? 'Deactivate' : 'Activate'}">
              ${u.is_active
                        ? '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'
                        : '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>'
                    }
            </button>
          </td>
        </tr>`;
            }).join('');
        }

        function openAddUser() {
            const formHTML = `
        <div class="form-group">
          <label for="newUsername">Username</label>
          <input type="text" id="newUsername" placeholder="Enter username" required>
        </div>
        <div class="form-group">
          <label for="newPassword">Password</label>
          <input type="password" id="newPassword" placeholder="Min 6 characters" required>
        </div>
        <div class="form-group">
          <label for="newDisplayName">Display Name</label>
          <input type="text" id="newDisplayName" placeholder="Full name">
        </div>
        <div class="form-group">
          <label for="newEmail">Email</label>
          <input type="email" id="newEmail" placeholder="email@example.com">
        </div>
        <div class="form-group">
          <label for="newRole">Role</label>
          <select id="newRole">
            <option value="viewer">Viewer</option>
            <option value="manager">Manager</option>
            <option value="admin">Admin</option>
          </select>
        </div>
      `;

            showModal('Add New User', formHTML, async () => {
                const user = {
                    username: document.getElementById('newUsername').value.trim(),
                    password: document.getElementById('newPassword').value,
                    display_name: document.getElementById('newDisplayName').value.trim(),
                    email: document.getElementById('newEmail').value.trim(),
                    role: document.getElementById('newRole').value
                };

                if (!user.username || !user.password) {
                    showToast('Username and password are required', 'warning');
                    return;
                }
                if (user.password.length < 6) {
                    showToast('Password must be at least 6 characters', 'warning');
                    return;
                }

                const btn = document.getElementById('modalConfirmBtn');
                if (btn) btn.disabled = true;

                try {
                    const result = await apiPost('/api/users', user);
                    if (result && !result.error) {
                        showToast(`User "${user.username}" created successfully`, 'success');
                        loadUsers();
                        loadAuditLog();
                    } else if (result && result.error) {
                        showToast(result.error, 'error');
                    }
                } finally {
                    if (btn) btn.disabled = false;
                }
            }, 'Create User', 'btn-success');
        }

        function openEditUser(id) {
            const u = usersData.find(x => x.id === id);
            if (!u) return;

            const formHTML = `
        <div class="form-group">
          <label>Username</label>
          <input type="text" value="${u.username}" disabled style="opacity:0.5;">
        </div>
        <div class="form-group">
          <label for="editDisplayName">Display Name</label>
          <input type="text" id="editDisplayName" value="${u.display_name || ''}">
        </div>
        <div class="form-group">
          <label for="editEmail">Email</label>
          <input type="email" id="editEmail" value="${u.email || ''}">
        </div>
        <div class="form-group">
          <label for="editRole">Role</label>
          <select id="editRole">
            <option value="viewer" ${u.role === 'viewer' ? 'selected' : ''}>Viewer</option>
            <option value="manager" ${u.role === 'manager' ? 'selected' : ''}>Manager</option>
            <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>Admin</option>
          </select>
        </div>
      `;

            showModal(`Edit User: ${u.username}`, formHTML, async () => {
                const btn = document.getElementById('modalConfirmBtn');
                if (btn) btn.disabled = true;

                try {
                    const result = await apiPut(`/api/users/${id}`, {
                        display_name: document.getElementById('editDisplayName').value.trim(),
                        email: document.getElementById('editEmail').value.trim(),
                        role: document.getElementById('editRole').value
                    });
                    if (result) {
                        showToast(`User "${u.username}" updated`, 'success');
                        loadUsers();
                        loadAuditLog();
                    }
                } finally {
                    if (btn) btn.disabled = false;
                }
            }, 'Save Changes', 'btn-primary');
        }

        function openChangePassword(id, username) {
            const formHTML = `
        <div class="form-group">
          <label for="newPwd">New Password</label>
          <input type="password" id="newPwd" placeholder="Min 6 characters">
        </div>
      `;

            showModal(`Change Password: ${username}`, formHTML, async () => {
                const pwd = document.getElementById('newPwd').value;
                if (!pwd || pwd.length < 6) {
                    showToast('Password must be at least 6 characters', 'warning');
                    return;
                }

                const btn = document.getElementById('modalConfirmBtn');
                if (btn) btn.disabled = true;

                try {
                    const result = await apiPut(`/api/users/${id}/password`, { password: pwd });
                    if (result && result.success) {
                        showToast(`Password changed for "${username}"`, 'success');
                        loadAuditLog();
                    }
                } finally {
                    if (btn) btn.disabled = false;
                }
            }, 'Change Password', 'btn-warning');
        }

        function toggleActive(id, username, isActive) {
            const action = isActive ? 'Deactivate' : 'Activate';
            showModal(
                `${action} User`,
                `<p>Are you sure you want to <strong>${action.toLowerCase()}</strong> user <strong>${username}</strong>?</p>`,
                async () => {
                    const btn = document.getElementById('modalConfirmBtn');
                    if (btn) btn.disabled = true;
                    try {
                        const result = await apiDelete(`/api/users/${id}`);
                        if (result) {
                            showToast(`User "${username}" ${isActive ? 'deactivated' : 'activated'}`, isActive ? 'warning' : 'success');
                            loadUsers();
                            loadAuditLog();
                        }
                    } finally {
                        if (btn) btn.disabled = false;
                    }
                },
                action,
                isActive ? 'btn-danger' : 'btn-success'
            );
        }

        async function loadAuditLog() {
            const data = await apiGet('/api/audit-log?limit=50');
            if (!data) return;

            const container = document.getElementById('auditLog');
            if (data.length === 0) {
                container.innerHTML = '<p class="no-data">No activity recorded yet.</p>';
                return;
            }

            let html = '<div class="table-wrapper"><table><thead><tr><th>Time</th><th>User</th><th>Action</th><th>Details</th></tr></thead><tbody>';
            for (const log of data) {
                const time = new Date(log.timestamp + 'Z').toLocaleDateString('en-IN', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
                const actionBadge = getActionBadge(log.action);
                html += `<tr>
          <td style="font-size:12px;color:var(--text-muted);white-space:nowrap;">${time}</td>
          <td><strong>${log.username || '-'}</strong></td>
          <td>${actionBadge}</td>
          <td style="font-size:13px;">${log.details || '-'}</td>
        </tr>`;
            }
            html += '</tbody></table></div>';
            container.innerHTML = html;
        }

        function getActionBadge(action) {
            const map = {
                LOGIN: 'badge-info', LOGOUT: 'badge-info',
                CREATE_USER: 'badge-success', UPDATE_USER: 'badge-warning',
                CHANGE_PASSWORD: 'badge-warning', TOGGLE_USER: 'badge-danger',
                PAY: 'badge-success', UNPAY: 'badge-warning', UPDATE_PAYMENT: 'badge-info',
                ADD_EXPENSE: 'badge-danger', DELETE_EXPENSE: 'badge-danger',
                INITIALIZE: 'badge-success', UPDATE: 'badge-info'
            };
            return `<span class="badge ${map[action] || ''}">${action.replace(/_/g, ' ')}</span>`;
        }
    </script>
</body>

</html>
